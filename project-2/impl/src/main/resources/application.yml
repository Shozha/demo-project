spring:
  application:
    name: project-2

  datasource:
    url: jdbc:postgresql://localhost:5432/agona-db-2026
    username: ${POSTGRES_DB}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enabled: true
    change-log: classpath:changelog/changelog-master.yaml

  redis:
    host: localhost
    port: 6379

  data:
    mongodb:
      uri: mongodb://localhost:27017/agona-mongo

  cache:
    type: redis

  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always

minio:
  url: http://localhost:9000
  access-key: ${MINIO_ROOT_USER}
  secret-key: ${MINIO_ROOT_PASSWORD}
  bucket-name: ${MINIO_BUCKET_NAME}

security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: 900000
    refresh-token-expiration-s: 604800
    revoked-token-retention-s: 86400

scheduling:
  token-cleanup-cron: "0 0 3 * * ?"
  minio-cleanup-cron: "0 0 4 * * ?"

logging:
  level:
    com.technokratos.agona: DEBUG
    org.springframework.security: INFO
