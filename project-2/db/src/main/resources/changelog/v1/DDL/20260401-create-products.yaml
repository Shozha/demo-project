databaseChangeLog:
  - changeSet:
      id: create-products
      author: shozha
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: price
                  type: NUMERIC(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: image_url
                  type: TEXT
                  constraints:
                    nullable: true