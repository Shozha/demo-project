version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: agona-postgres
    environment:
      POSTGRES_DB: agona-db-2026
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwerty
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agona-redis
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:latest
    container_name: agona-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  minio:
    image: minio/minio:latest
    container_name: agona-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_user
      MINIO_ROOT_PASSWORD: minio_qwerty
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  mongo-data:
  minio-data: