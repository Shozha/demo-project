databaseChangeLog:
  - changeSet:
      id: create-user-account-table
      author: shozha
      comment: Создание таблицы учётных записей пользователей
      changes:
        - createTable:
            tableName: user_account
            remarks: Учётные записи пользователей
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  remarks: UUID пользователя
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_user_account
              - column:
                  name: email
                  type: varchar(255)
                  remarks: Email (логин)
                  constraints:
                    nullable: false
              - column:
                  name: nickname
                  type: varchar(255)
                  remarks: Отображаемое имя
                  constraints:
                    nullable: false
              - column:
                  name: hash_password
                  type: varchar(255)
                  remarks: Хэш пароля (BCrypt)
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: user_account
            columnNames: email
            constraintName: uq_user_account_email

        - addUniqueConstraint:
            tableName: user_account
            columnNames: nickname
            constraintName: uq_user_account_nickname

  - changeSet:
      id: create-user-account-roles-table
      author: shozha
      comment: Создание таблицы ролей пользователей
      changes:
        - createTable:
            tableName: user_account_roles
            remarks: Связь пользователей с ролями
            columns:
              - column:
                  name: user_account_id
                  type: uuid
                  remarks: UUID пользователя
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(50)
                  remarks: Роль (ROLE_STUDENT, ROLE_TEACHER)
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: user_account_roles
            columnNames: user_account_id, role
            constraintName: pk_user_account_roles

        - addForeignKeyConstraint:
            baseTableName: user_account_roles
            baseColumnNames: user_account_id
            referencedTableName: user_account
            referencedColumnNames: id
            constraintName: fk_user_roles_account
            onDelete: CASCADE

  - changeSet:
      id: create-refresh-token-table
      author: shozha
      comment: Создание таблицы refresh-токенов
      changes:
        - createTable:
            tableName: refresh_token
            remarks: Refresh-токены пользователей
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  remarks: UUID записи
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_refresh_token
              - column:
                  name: user_account_id
                  type: uuid
                  remarks: UUID пользователя
                  constraints:
                    nullable: false
              - column:
                  name: token_hash
                  type: varchar(255)
                  remarks: HMAC-хэш refresh-токена
                  constraints:
                    nullable: false
              - column:
                  name: fingerprint_hash
                  type: varchar(255)
                  remarks: HMAC-хэш идентификатора устройства
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
                  defaultValueBoolean: true
                  remarks: Флаг активности
                  constraints:
                    nullable: false
              - column:
                  name: expiry_date
                  type: timestamp
                  remarks: Дата истечения срока действия
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: refresh_token
            columnNames: token_hash
            constraintName: uq_refresh_token_hash

        - addForeignKeyConstraint:
            baseTableName: refresh_token
            baseColumnNames: user_account_id
            referencedTableName: user_account
            referencedColumnNames: id
            constraintName: fk_refresh_token_account
            onDelete: CASCADE
