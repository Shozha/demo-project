spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/peer-review
    starter:
      permit-all:
        - /actuator/health
        - /actuator/info
        - /v3/api-docs/**
        - /swagger-ui/**
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true