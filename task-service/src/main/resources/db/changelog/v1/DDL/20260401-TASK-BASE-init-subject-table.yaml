databaseChangeLog:
  - changeSet:
      id: create-task-table
      author: rezordoc
      changes:
        - createTable:
            tableName: task
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: "gen_random_uuid()"
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_task
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
              - column:
                  name: title
                  type: VARCHAR(255)
                  remarks: "Название задачи"
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  remarks: "Описание задачи"
                  constraints:
                    nullable: true
              - column:
                  name: starter_code
                  type: TEXT
                  remarks: "Начальный код для задачи"
                  constraints:
                    nullable: true
              - column:
                  name: deadline
                  type: TIMESTAMP
                  remarks: "Дедлайн сдачи задачи"
                  constraints:
                    nullable: true
              - column:
                  name: review_deadline
                  type: TIMESTAMP
                  remarks: "Дедлайн проверки задачи"
                  constraints:
                    nullable: true
              - column:
                  name: required_reviewers
                  type: INT
                  remarks: "Необходимое количество ревьюеров"
                  constraints:
                    nullable: true
              - column:
                  name: max_score
                  type: INT
                  remarks: "Максимальный балл за задачу"
                  constraints:
                    nullable: true

  - changeSet:
      id: create-task-indexes
      author: developer
      changes:
        - createIndex:
            tableName: task
            indexName: idx_task_created_at
            columns:
              - column:
                  name: created_at
        - createIndex:
            tableName: task
            indexName: idx_task_deadline
            columns:
              - column:
                  name: deadline
        - createIndex:
            tableName: task
            indexName: idx_task_review_deadline
            columns:
              - column:
                  name: review_deadline